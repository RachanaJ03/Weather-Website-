<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Weather App</title>
  <style>
    :root{
      --bg: #0b1220;
      --panel: #0f172a;
      --panel-2: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --accent-2: #34d399;
      --warn: #f59e0b;
      --error: #ef4444;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color:var(--text);
      background: radial-gradient(1200px 800px at 80% -10%, #1e3a8a33, transparent),
                  radial-gradient(1500px 900px at -10% -20%, #04785722, transparent),
                  var(--bg);
    }
    .container{max-width:980px;margin:0 auto;padding:24px}
    header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:18px}
    .title{font-weight:800;font-size:24px;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
    .title .logo{display:grid;place-items:center;width:36px;height:36px;border-radius:12px;background: linear-gradient(135deg, var(--accent), var(--accent-2));box-shadow: var(--shadow)}
    .panel{
      background:linear-gradient(180deg, #0f172abf, #0b1220dd);
      border:1px solid #ffffff10;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .controls{
      display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;
      padding:14px; backdrop-filter: blur(6px);
    }
    .search{display:flex;gap:10px;align-items:center}
    .search input{
      width:100%;padding:12px 14px;border-radius:12px;border:1px solid #ffffff22;background:#0b1220cc;color:var(--text);
      outline:none
    }
    .btn{
      padding:12px 14px;border:none;border-radius:12px;background:var(--accent);color:white;font-weight:700;cursor:pointer
    }
    .btn.secondary{background:#1f2937;color:var(--text);border:1px solid #ffffff22}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .unit-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;background:#0b1220cc;border:1px solid #ffffff22}
    .unit-toggle input{appearance:none;width:42px;height:24px;border-radius:999px;background:#334155;position:relative;outline:none;cursor:pointer}
    .unit-toggle input::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;background:#e5e7eb;border-radius:999px;transition:.2s}
    .unit-toggle input:checked{background:#2563eb}
    .unit-toggle input:checked::after{left:21px}

    .grid{display:grid;gap:16px}
    @media(min-width:900px){.grid{grid-template-columns: 380px 1fr}}

    .current{padding:18px}
    .current .place{display:flex;align-items:baseline;gap:10px}
    .current .place h2{margin:0;font-size:28px}
    .current .place .small{color:var(--muted);font-size:14px}
    .temp-row{display:flex;align-items:center;gap:16px;margin-top:12px}
    .temp{font-size:64px;font-weight:800}
    .emoji{font-size:48px}
    .meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
    .chip{padding:8px 10px;border-radius:999px;background:#0b1220cc;border:1px solid #ffffff22;color:#d1d5db}

    .forecast{padding:18px}
    .days{display:grid;grid-template-columns: repeat(auto-fill,minmax(120px,1fr));gap:12px}
    .day{border:1px solid #ffffff12;background:#0a1220a6;border-radius:14px;padding:12px;display:grid;gap:8px}
    .day .name{color:#cbd5e1;font-weight:700}
    .day .max{font-size:20px;font-weight:800}
    .muted{color:var(--muted)}

    .footer{margin-top:14px;color:#94a3b8;font-size:12px;text-align:center}
    .error{color:var(--error);margin-left:10px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="title"><span class="logo" aria-hidden>☼</span> Weather Now</div>
      <div class="unit-toggle" title="Toggle °C / °F">
        <span>°C</span>
        <input id="unitToggle" type="checkbox" aria-label="Toggle Celsius and Fahrenheit" />
        <span>°F</span>
      </div>
    </header>

    <section class="panel controls" role="search">
      <div class="search">
        <input id="cityInput" type="text" placeholder="Search city (e.g., Mumbai, London)" aria-label="City name" />
        <button class="btn" id="searchBtn">Search</button>
        <span id="error" class="error" role="alert" aria-live="polite"></span>
      </div>
      <button class="btn secondary" id="locBtn" title="Use current location">Use my location</button>
      <button class="btn secondary" id="demoBtn" title="Demo: Tokyo">Try a demo</button>
    </section>

    <section class="grid" aria-live="polite">
      <article class="panel current" id="currentPanel">
        <div class="place"><h2 id="place">—</h2><span id="coords" class="small"></span></div>
        <div class="temp-row">
          <div id="emoji" class="emoji">⛅</div>
          <div class="temp" id="temp">--°</div>
        </div>
        <div id="summary" class="muted" style="margin-top:2px">—</div>
        <div class="meta">
          <span class="chip" id="apparent">Feels like —</span>
          <span class="chip" id="humidity">Humidity —</span>
          <span class="chip" id="wind">Wind —</span>
        </div>
      </article>

      <aside class="panel forecast">
        <h3 style="margin:0 0 8px 0">7‑Day Forecast</h3>
        <div class="days" id="days"></div>
        <div class="footer">Data by <a href="https://open-meteo.com/" target="_blank" rel="noreferrer">Open‑Meteo</a>. No API key required.</div>
      </aside>
    </section>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    const unitToggle = el('unitToggle');
    const cityInput = el('cityInput');
    const searchBtn = el('searchBtn');
    const locBtn = el('locBtn');
    const demoBtn = el('demoBtn');
    const errorEl = el('error');

    const state = {
      unit: localStorage.getItem('unit') || 'c', // 'c' or 'f'
      lastCoords: null,
    };

    unitToggle.checked = state.unit === 'f';

    const WMO_CODE = {
      0: {t:"Clear", e:"☀️"}, 1:{t:"Mainly clear",e:"🌤️"}, 2:{t:"Partly cloudy",e:"⛅"}, 3:{t:"Overcast",e:"☁️"},
      45:{t:"Fog",e:"🌫️"}, 48:{t:"Depositing rime fog",e:"🌫️"},
      51:{t:"Light drizzle",e:"🌦️"}, 53:{t:"Drizzle",e:"🌦️"}, 55:{t:"Heavy drizzle",e:"🌧️"},
      56:{t:"Freezing drizzle",e:"🌧️"}, 57:{t:"Freezing drizzle",e:"🌧️"},
      61:{t:"Light rain",e:"🌧️"}, 63:{t:"Rain",e:"🌧️"}, 65:{t:"Heavy rain",e:"🌧️"},
      66:{t:"Freezing rain",e:"🌧️"}, 67:{t:"Freezing rain",e:"🌧️"},
      71:{t:"Light snow",e:"🌨️"}, 73:{t:"Snow",e:"🌨️"}, 75:{t:"Heavy snow",e:"🌨️"},
      77:{t:"Snow grains",e:"🌨️"}, 80:{t:"Rain showers",e:"🌦️"}, 81:{t:"Heavy showers",e:"🌧️"}, 82:{t:"Violent showers",e:"🌧️"},
      85:{t:"Snow showers",e:"🌨️"}, 86:{t:"Heavy snow showers",e:"🌨️"},
      95:{t:"Thunderstorm",e:"⛈️"}, 96:{t:"Thunderstorm & hail",e:"⛈️"}, 99:{t:"Thunderstorm & hail",e:"⛈️"}
    };

    function fmtTemp(v){ return Math.round(v) + '°'; }
    function dayName(d){ return new Date(d).toLocaleDateString(undefined,{weekday:'short'}); }

    async function geocodeCity(name){
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=en&format=json`;
      const r = await fetch(url);
      if(!r.ok) throw new Error('Failed to search city');
      const j = await r.json();
      if(!j.results || !j.results.length) throw new Error('City not found');
      const g = j.results[0];
      return { lat:g.latitude, lon:g.longitude, name:`${g.name}${g.admin1?`, ${g.admin1}`:''}, ${g.country}` };
    }

    async function fetchWeather(lat, lon){
      const tempUnit = state.unit === 'f' ? 'fahrenheit' : 'celsius';
      const windUnit = state.unit === 'f' ? 'mph' : 'kmh';
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=${tempUnit}&wind_speed_unit=${windUnit}&timezone=auto`;
      const r = await fetch(url);
      if(!r.ok) throw new Error('Failed to fetch weather');
      return r.json();
    }

    function renderCurrent(name, lat, lon, current){
      el('place').textContent = name || '—';
      el('coords').textContent = name ? `(${lat.toFixed(2)}, ${lon.toFixed(2)})` : '';
      el('temp').textContent = current?.temperature_2m!=null ? fmtTemp(current.temperature_2m) : '--°';
      const code = current?.weather_code;
      const meta = WMO_CODE[code] || {t:'—', e:'⛅'};
      el('emoji').textContent = meta.e;
      el('summary').textContent = meta.t;
      el('apparent').textContent = `Feels like ${current?.apparent_temperature!=null ? fmtTemp(current.apparent_temperature) : '—'}`;
      el('humidity').textContent = `Humidity ${current?.relative_humidity_2m!=null ? Math.round(current.relative_humidity_2m)+'%' : '—'}`;
      el('wind').textContent = `Wind ${current?.wind_speed_10m!=null ? Math.round(current.wind_speed_10m) : '—'} ${state.unit==='f'?'mph':'km/h'}`;
    }

    function renderForecast(daily){
      const wrap = el('days');
      wrap.innerHTML = '';
      if(!daily?.time) return;
      daily.time.forEach((date, i) => {
        const code = daily.weather_code?.[i];
        const meta = WMO_CODE[code] || {t:'', e:'⛅'};
        const max = daily.temperature_2m_max?.[i];
        const min = daily.temperature_2m_min?.[i];
        const card = document.createElement('div');
        card.className = 'day';
        card.innerHTML = `
          <div class="name">${dayName(date)}</div>
          <div class="emoji" aria-hidden="true" style="font-size:28px">${meta.e}</div>
          <div class="muted" style="min-height:20px">${meta.t}</div>
          <div><span class="max">${fmtTemp(max)}</span> <span class="muted">/ ${fmtTemp(min)}</span></div>
        `;
        wrap.appendChild(card);
      });
    }

    async function loadByCoords(name, lat, lon){
      try{
        errorEl.textContent = '';
        const data = await fetchWeather(lat, lon);
        state.lastCoords = {lat, lon, name};
        renderCurrent(name, lat, lon, data.current);
        renderForecast(data.daily);
      }catch(err){
        console.error(err);
        errorEl.textContent = err.message || 'Something went wrong.';
      }
    }

    async function onSearch(){
      const q = cityInput.value.trim();
      if(!q){ errorEl.textContent = 'Type a city name.'; return; }
      errorEl.textContent = 'Searching…';
      try{
        const {lat, lon, name} = await geocodeCity(q);
        await loadByCoords(name, lat, lon);
        errorEl.textContent = '';
      }catch(err){
        errorEl.textContent = err.message || 'City not found';
      }
    }

    async function useLocation(){
      errorEl.textContent = '';
      if(!('geolocation' in navigator)){
        errorEl.textContent = 'Geolocation not supported.'; return;
      }
      errorEl.textContent = 'Getting location…';
      navigator.geolocation.getCurrentPosition(async (pos)=>{
        const {latitude:lat, longitude:lon} = pos.coords;
        await loadByCoords('My Location', lat, lon);
        errorEl.textContent = '';
      }, (e)=>{
        errorEl.textContent = 'Location permission denied.';
      }, {enableHighAccuracy:true, timeout:10000});
    }

    function toggleUnit(){
      state.unit = unitToggle.checked ? 'f' : 'c';
      localStorage.setItem('unit', state.unit);
      if(state.lastCoords){
        const {lat, lon, name} = state.lastCoords;
        loadByCoords(name, lat, lon);
      }
    }

    // Wire up
    searchBtn.addEventListener('click', onSearch);
    cityInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') onSearch(); });
    locBtn.addEventListener('click', useLocation);
    unitToggle.addEventListener('change', toggleUnit);
    demoBtn.addEventListener('click', ()=>{ cityInput.value = 'Tokyo'; onSearch(); });

    // Initial demo city
    (async ()=>{
      try{ await onSearch.call({ value: cityInput.value = 'Mumbai' }); }catch(_){}
    })();
  </script>
</body>
</html>
